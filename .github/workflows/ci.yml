name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout OMNIA backbone
        uses: actions/checkout@v4
        with:
          repository: Tuttotorna/OMNIA
          path: _backbone/OMNIA

      - name: Checkout omnia-limit backbone
        uses: actions/checkout@v4
        with:
          repository: Tuttotorna/omnia-limit
          path: _backbone/omnia-limit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e _backbone/OMNIA
          python -m pip install -e _backbone/omnia-limit
          python -m pip install -e .

      - name: Run required CI registration tests
        shell: bash
        env:
          OMNIA_SOURCE_DIR: ${{ github.workspace }}/_backbone/OMNIA
        run: |
              python -m pytest -q tests/test_final_audit_release_doi.py
          python -m pytest -q tests/test_final_release_audit.py
          python -m pytest -q tests/test_first_reader_path.py
          python -m pytest -q tests/test_first_reader_path_commit_registration.py
          python -m pytest -q tests/test_lon_mirror_public_entrypoint_registration.py
          python -m pytest -q tests/test_registry_anchor_role_separation.py

      - name: Run full test suite
        shell: bash
        env:
          OMNIA_SOURCE_DIR: ${{ github.workspace }}/_backbone/OMNIA
        run: |
          python -m pytest -q
