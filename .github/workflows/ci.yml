name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout OMNIA-VALIDATION
        uses: actions/checkout@v4
        with:
          path: OMNIA-VALIDATION

      - name: Checkout OMNIA
        uses: actions/checkout@v4
        with:
          repository: Tuttotorna/OMNIA
          path: OMNIA

      - name: Checkout omnia-limit
        uses: actions/checkout@v4
        with:
          repository: Tuttotorna/omnia-limit
          path: omnia-limit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backbone packages
        run: |
          python -m pip install -e ./omnia-limit
          python -m pip install -e ./OMNIA
          python -m pip install -e ./OMNIA-VALIDATION[dev]

      - name: Run omnia-limit tests
        working-directory: omnia-limit
        run: python -m pytest -q

      - name: Run OMNIA tests
        working-directory: OMNIA
        run: python -m pytest -q

      - name: Run OMNIA-VALIDATION tests
        working-directory: OMNIA-VALIDATION
        run: python -m pytest -q

      - name: Run explicit backbone end-to-end test
        working-directory: OMNIA-VALIDATION
        run: python -m pytest -q tests/test_end_to_end_backbone.py

      - name: Run ecosystem backbone compliance registry test
        run: |
          cd OMNIA-VALIDATION
          python -m pytest -q tests/test_ecosystem_backbone_compliance_registry.py
